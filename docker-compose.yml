version: '3.8'

services:
  ai-vision:
    build: .
    container_name: ai_vision_app
    privileged: true # Required for webcam and hardware access
    network_mode: host
    environment:
      # Use the host's X11 display. For Windows using VcXsrv: host.docker.internal:0
      # For Linux/WSL2: $DISPLAY
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      # Pass through X11 socket for Linux/WSL2 GUI rendering
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      ## Uncomment the lines below on Linux for Audio (PulseAudio) support:
      # - /run/user/1000/pulse/native:/run/user/1000/pulse/native
      # - ~/.config/pulse/cookie:/root/.config/pulse/cookie:ro
      ## Passing webcam explicitly on Linux (if not using privileged):
      # - /dev/video0:/dev/video0
    devices:
      # Pass through the primary webcam
      - /dev/video0:/dev/video0
      # Pass through audio device
      - /dev/snd:/dev/snd
    # Prevents Docker from exiting immediately
    stdin_open: true
    tty: true
